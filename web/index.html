  <script src="https://js.tappaysdk.com/sdk/tpdirect/v5.19.1"></script>
  <script>
    window.demoBridge = {
      initTapPay: function (appId, appKey, env) {
        TPDirect.setupSDK(appId, appKey, env);
      },

      areCardFieldsReady: function () {
        return !!(
          document.getElementById('card-number-input') &&
          document.getElementById('expiry-input') &&
          document.getElementById('ccv-input')
        );
      },

      getCardData: function () {
        const cardNumberEl = document.getElementById('card-number-input');
        const expiryEl = document.getElementById('expiry-input');
        const ccvEl = document.getElementById('ccv-input');

        return JSON.stringify({
          cardNumber: cardNumberEl ? cardNumberEl.value : '',
          expirationDate: expiryEl ? expiryEl.value : '',
          ccv: ccvEl ? ccvEl.value : ''
        });
      },

      setupCardData: function () {
        const cardNumberEl = document.getElementById('card-number-input');
        const expiryEl = document.getElementById('expiry-input');
        const ccvEl = document.getElementById('ccv-input');

        if (!cardNumberEl || !expiryEl || !ccvEl) {
          console.warn('TapPay card field containers are not ready yet');
          return false;
        }

        TPDirect.card.setup({
          fields: {
            number: {
              element: '#card-number-input',
              placeholder: '1234 5678 9012 3456'
            },
            expirationDate: {
              element: '#expiry-input',
              placeholder: 'MM / YY'
            },
            ccv: {
              element: '#ccv-input',
              placeholder: 'CCV'
            }
          },
          styles: {
            input: {
              color: '#222',
              'font-size': '16px'
            },
            ':focus': {
              color: '#000'
            },
            '.valid': {
              color: 'green'
            },
            '.invalid': {
              color: 'red'
            }
          }
        });
        return true;
      },

      getPrime: function (callback) {
        TPDirect.card.getPrime(function (result) {
          callback(result);
        });
      },

      canGetPrime: function () {
        const status = TPDirect.card.getTappayFieldsStatus();
        return !!status.canGetPrime;
      },

      isTapPayLoaded: function () {
        return typeof TPDirect !== 'undefined';
      }
    };
  </script>
</head>
<body>
  <div id="loading">
    <img src="loading.gif" alt="Loading..." />

  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>

      inset: 0;

      justify-content: center;

      z-index: 9999;
    }

    #loading img {
      max-width: 520px;
      max-height: 520px;
      width: auto;
      height: auto;
      object-fit: contain;
    }
  </style>
